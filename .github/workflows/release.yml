name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release Binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ccboard
            asset_name: ccboard-linux-x86_64
          # ARM64 Linux temporarily disabled - cross-compilation issues
          # - os: ubuntu-latest
          #   target: aarch64-unknown-linux-gnu
          #   artifact_name: ccboard
          #   asset_name: ccboard-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: ccboard
            asset_name: ccboard-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ccboard
            asset_name: ccboard-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ccboard.exe
            asset_name: ccboard-windows-x86_64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: "v0.21.7"

      - name: Build WASM frontend
        working-directory: crates/ccboard-web
        run: trunk build --release

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin ccboard

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Compress binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          mv ${{ matrix.asset_name }}.tar.gz ../../..

      - name: Compress binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ matrix.asset_name }}.zip ${{ matrix.artifact_name }}
          move ${{ matrix.asset_name }}.zip ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            ${{ matrix.asset_name }}.tar.gz
            ${{ matrix.asset_name }}.zip
          if-no-files-found: ignore

  create-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to root
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release-assets/ \;
          ls -lah release-assets/

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "Generating changelog for version $VERSION"

          # Extract changelog from CHANGELOG.md or use git log
          if grep -q "## \[${VERSION}\]" CHANGELOG.md 2>/dev/null; then
            sed -n "/## \[${VERSION}\]/,/## \[/p" CHANGELOG.md | sed '$ d' > changelog.txt
          else
            echo "## Changes in v$VERSION" > changelog.txt
            echo "" >> changelog.txt
            git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> changelog.txt
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.get_version.outputs.version }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — uploading missing assets only (no clobber)"
            # Only upload assets that are not yet present to avoid SHA256 drift
            EXISTING=$(gh release view "$TAG" --json assets --jq '[.assets[].name]')
            for f in release-assets/*; do
              name=$(basename "$f")
              if echo "$EXISTING" | grep -q "\"$name\""; then
                echo "  skip $name (already uploaded)"
              else
                gh release upload "$TAG" "$f"
                echo "  uploaded $name"
              fi
            done
          else
            gh release create "$TAG" \
              --title "ccboard v${VERSION}" \
              --notes-file changelog.txt \
              release-assets/*
          fi

  update-homebrew-tap:
    name: Update Homebrew Tap Formula
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download release assets and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          BASE="https://github.com/FlorianBruniaux/ccboard/releases/download/v${VERSION}"
          curl -sLo macos-aarch64.tar.gz "${BASE}/ccboard-macos-aarch64.tar.gz"
          curl -sLo macos-x86_64.tar.gz  "${BASE}/ccboard-macos-x86_64.tar.gz"
          curl -sLo linux-x86_64.tar.gz  "${BASE}/ccboard-linux-x86_64.tar.gz"
          echo "sha_macos_arm=$(sha256sum macos-aarch64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "sha_macos_x86=$(sha256sum macos-x86_64.tar.gz  | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "sha_linux_x86=$(sha256sum linux-x86_64.tar.gz  | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update homebrew-tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          SHA_ARM="${{ steps.sha.outputs.sha_macos_arm }}"
          SHA_X86="${{ steps.sha.outputs.sha_macos_x86 }}"
          SHA_LNX="${{ steps.sha.outputs.sha_linux_x86 }}"

          FORMULA=$(cat <<RUBY
          class Ccboard < Formula
            desc "Unified TUI/Web dashboard for Claude Code management"
            homepage "https://github.com/FlorianBruniaux/ccboard"
            version "${VERSION}"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              on_arm do
                url "https://github.com/FlorianBruniaux/ccboard/releases/download/v\#{version}/ccboard-macos-aarch64.tar.gz"
                sha256 "${SHA_ARM}"
              end
              on_intel do
                url "https://github.com/FlorianBruniaux/ccboard/releases/download/v\#{version}/ccboard-macos-x86_64.tar.gz"
                sha256 "${SHA_X86}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/FlorianBruniaux/ccboard/releases/download/v\#{version}/ccboard-linux-x86_64.tar.gz"
                sha256 "${SHA_LNX}"
              end
            end

            def install
              bin.install "ccboard"
            end

            def caveats
              <<~EOS
                ccboard requires Claude Code installed with ~/.claude directory.

                Run Claude Code at least once to generate the directory:
                  claude

                Launch ccboard:
                  ccboard              # TUI mode (default)
                  ccboard web          # Web interface on port 3333
                  ccboard stats        # Print stats and exit
                  ccboard discover     # Analyze sessions for CLAUDE.md/skills/commands suggestions

                Documentation:
                  https://github.com/FlorianBruniaux/ccboard#readme
              EOS
            end

            test do
              assert_match "ccboard", shell_output("\#{bin}/ccboard --version 2>&1")
            end
          end
          RUBY
          )

          # Get current file SHA for GitHub API update
          FILE_SHA=$(curl -s -H "Authorization: token ${TAP_TOKEN}" \
            "https://api.github.com/repos/FlorianBruniaux/homebrew-tap/contents/Formula/ccboard.rb" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          ENCODED=$(echo "$FORMULA" | base64 -w 0)

          curl -s -X PUT \
            -H "Authorization: token ${TAP_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/FlorianBruniaux/homebrew-tap/contents/Formula/ccboard.rb" \
            -d "{
              \"message\": \"chore: bump ccboard formula to v${VERSION}\",
              \"content\": \"${ENCODED}\",
              \"sha\": \"${FILE_SHA}\"
            }" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Updated:', d.get('commit',{}).get('sha','ERROR'))"

  publish-crates:
    name: Publish to crates.io
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish ccboard-core
        run: cargo publish -p ccboard-core --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io propagation
        run: sleep 30

      - name: Publish ccboard-tui
        run: cargo publish -p ccboard-tui --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Publish ccboard-web
        # --no-verify: dist/ (WASM assets) is not present in a fresh checkout;
        # the build is already verified by the build-release job.
        run: cargo publish -p ccboard-web --no-verify --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

      - name: Wait for crates.io propagation
        run: sleep 30

      - name: Publish ccboard
        run: cargo publish -p ccboard --no-verify --token ${{ secrets.CARGO_TOKEN }}

  # Requires: WINGET_TOKEN secret — a GitHub PAT (classic) with `public_repo` scope,
  # created on an account that has forked microsoft/winget-pkgs.
  # The action opens a PR to winget-pkgs on each new tag automatically.
  publish-winget:
    name: Publish to WinGet
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Submit to WinGet
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: FlorianBruniaux.ccboard
          token: ${{ secrets.WINGET_TOKEN }}
          installers-regex: 'ccboard-windows-x86_64\.exe\.zip$'
